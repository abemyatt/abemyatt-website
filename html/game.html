<!doctype html>

<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link
            rel="stylesheet"
            href="https://cdn.abemyatt.com/styles/styles.v2.css"
            onerror="
      this.onerror = null;
      this.href = '../styles/styles.v2.css';
    "
    />
    <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="https://cdn.abemyatt.com/favicon/apple-touch-icon.png"
            onerror="
      this.onerror = null;
      this.href = '../favicon_io/apple-touch-icon.png';
    "
    />
    <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="https://cdn.abemyatt.com/favicon/favicon-32x32.png"
            onerror="
      this.onerror = null;
      this.href = '../favicon_io/favicon-32x32.png';
    "
    />
    <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="https://cdn.abemyatt.com/favicon/favicon-16x16.png"
            onerror="
      this.onerror = null;
      this.href = '../favicon_io/favicon-16x16.png';
    "
    />
    <link
            rel="manifest"
            href="https://cdn.abemyatt.com/favicon/site.webmanifest"
            onerror="
      this.onerror = null;
      this.href = '../favicon_io/site.webmanifest';
    "
    />
    <link
            rel="shortcut icon"
            href="https://cdn.abemyatt.com/favicon/favicon.ico"
            onerror="
      this.onerror = null;
      this.href = '../favicon_io/favicon.ico';
    "
    />
    <script src="https://cdn.abemyatt.com/scripts/audio.v1.js" defer></script>
    <script src="https://cdn.abemyatt.com/scripts/game.v1.2.js" defer></script>
    <title>Game | Abe Myatt</title>
</head>
<body>
<header>
    <h1>Abe Myatt</h1>
    <nav>
        <ul>
            <li><a href="index">Home</a></li>
            <li><a href="about">About</a></li>
            <li><a href="projects">Projects</a></li>
            <li><a href="music">Music</a></li>
            <li><a href="cars">Cars</a></li>
            <li><a href="philosophies">Philosophies</a></li>
            <li><a href="impulses">Impulses</a></li>
            <li><a href="game" class="active">Game</a></li>
        </ul>
    </nav>
</header>
<div id="stats-panel">
    <h3>Stats</h3>
    <p id="stats-text"></p>
    <div id="stats-breakdown"></div>
    <button id="reset-stats-button" class="game-button">
        Reset Progress
    </button>
</div>
<div id="audio-controls">
    <h4>Audio</h4>
    <div>
        <label>Music</label><br>
        <button id="music-toggle">Unmute</button>
        <input type="range" id="music-volume" min="0" max="1" step="0.01" value="0.3">
    </div>

    <div style="margin-top: 0.5rem;">
        <label>Roll Sound</label><br>
        <button id="roll-toggle">Mute</button>
        <input type="range" id="roll-volume" min="0" max="1" step="0.01" value="0.5">
    </div>
</div>
<main>
    <div class="content">
        <h1>This is a game</h1>
        <p>You need to click the button for a chance to get something.</p>
        <button id="game-button" class="game-button">Click Me</button>
        <div id="result">
            <div class="image-frame">
                <img id="result-image" src="" alt=""
                     style="display: none; max-width: 75%; margin: 0 auto; padding: 1rem;">
            </div>
            <p id="result-text"></p>
        </div>
    </div>
</main>
<footer>&copy; Abe Myatt.</footer>
</body>
</html>
